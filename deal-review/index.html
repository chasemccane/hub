<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal Review · Chase McCane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090d10;
      --surface: #111820;
      --border: #1e2a35;
      --green: #00a86b;
      --green-dim: rgba(0,168,107,.12);
      --green-glow: rgba(0,168,107,.25);
      --red: #ff3000;
      --red-dim: rgba(255,48,0,.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,.1);
      --text: #e8edf2;
      --muted: #6b7a8a;
      --card: #141d26;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .back-btn {
      width: 32px; height: 32px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--muted); font-size: 16px; transition: all .15s;
    }
    .back-btn:hover { border-color: var(--green); color: var(--green); }
    .hbreadcrumb { font-size: 12px; color: var(--muted); }
    .hbreadcrumb a { color: var(--muted); text-decoration: none; }
    .hbreadcrumb a:hover { color: var(--green); }
    .htitle { font-size: 16px; font-weight: 800; margin-left: auto; }

    /* LAYOUT */
    .layout { display: flex; flex: 1; min-height: 0; height: calc(100vh - 57px); }

    /* SIDEBAR */
    .sidebar {
      width: 240px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .sidebar-label {
      font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; padding: 20px 16px 8px;
    }
    .deal-item {
      padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent;
      transition: all .15s; border-bottom: 1px solid var(--border);
    }
    .deal-item:hover { background: var(--card); }
    .deal-item.active { background: var(--card); border-left-color: var(--green); }
    .di-name { font-size: 13px; font-weight: 700; }
    .di-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .di-stage {
      font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      margin-top: 6px; display: inline-block;
    }
    .s-propose { background: rgba(59,130,246,.12); color: #60a5fa; }
    .s-negotiate { background: var(--green-dim); color: var(--green); }
    .s-qualify { background: var(--amber-dim); color: var(--amber); }

    .add-deal-btn {
      margin: 12px; padding: 9px; border-radius: 8px;
      background: transparent; border: 1px dashed var(--border);
      color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .add-deal-btn:hover { border-color: var(--green-glow); color: var(--green); background: var(--green-dim); }

    /* DETAIL PANEL */
    .detail { flex: 1; overflow-y: auto; padding: 32px; }
    .no-deal { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 14px; }

    /* Deal header */
    .deal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
    .dh-left { }
    .dh-company { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
    .dh-meta { font-size: 13px; color: var(--muted); }
    .dh-links { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .dh-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 7px;
      text-decoration: none; transition: all .15s;
    }
    .dh-link-map { background: var(--green-dim); border: 1px solid var(--green-glow); color: var(--green); }
    .dh-link-map:hover { background: rgba(0,168,107,.2); }
    .dh-link-prop { background: var(--blue-dim); border: 1px solid rgba(59,130,246,.2); color: #60a5fa; }
    .dh-link-prop:hover { background: rgba(59,130,246,.18); }
    .dh-link-sf { background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.2); color: #a5b4fc; }
    .dh-link-sf:hover { background: rgba(99,102,241,.18); }
    .dh-score {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; text-align: center; min-width: 100px;
    }
    .dh-score-val { font-size: 32px; font-weight: 900; color: var(--green); }
    .dh-score-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 2px; }

    /* Section headers */
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* MEDDIC */
    .meddic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 28px; }
    .med-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px;
    }
    .med-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .med-icon { font-size: 16px; }
    .med-label { font-size: 12px; font-weight: 700; }
    .med-sublabel { font-size: 10px; color: var(--muted); margin-left: auto; }
    .med-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-green { background: var(--green); }
    .dot-amber { background: var(--amber); }
    .dot-red { background: var(--red); }
    .dot-gray { background: var(--muted); }
    .med-content {
      font-size: 12px; color: var(--text); line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
      min-height: 48px; cursor: text;
      outline: none; border-radius: 6px; padding: 6px 8px; margin: -6px -8px;
      transition: background .15s;
    }
    .med-content:hover { background: rgba(255,255,255,.03); }
    .med-content:focus { background: rgba(255,255,255,.05); outline: 1px solid var(--border); }
    .med-content[data-empty="true"] { color: var(--muted); font-style: italic; }

    /* Two-col sections */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .one-col { margin-bottom: 28px; }

    .panel {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px;
    }
    .panel-title { font-size: 12px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    /* Risk items */
    .risk-list { display: flex; flex-direction: column; gap: 8px; }
    .risk-item { display: flex; gap: 10px; align-items: flex-start; }
    .risk-sev {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
      flex-shrink: 0; text-transform: uppercase; margin-top: 1px;
    }
    .sev-high { background: var(--red-dim); color: var(--red); }
    .sev-med { background: var(--amber-dim); color: var(--amber); }
    .sev-low { background: var(--green-dim); color: var(--green); }
    .risk-text { font-size: 12px; line-height: 1.5; }
    .risk-mit { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .add-risk-btn, .add-done-btn, .add-left-btn {
      font-size: 12px; font-weight: 600; color: var(--muted);
      background: transparent; border: 1px dashed var(--border);
      border-radius: 7px; padding: 7px 12px; cursor: pointer; width: 100%;
      margin-top: 10px; transition: all .15s;
    }
    .add-risk-btn:hover, .add-done-btn:hover, .add-left-btn:hover {
      border-color: var(--green-glow); color: var(--green); background: var(--green-dim);
    }

    /* Done / Left */
    .check-list { display: flex; flex-direction: column; gap: 6px; }
    .check-item { display: flex; align-items: flex-start; gap: 8px; }
    .check-box {
      width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
    }
    .check-done { background: var(--green-dim); border: 1px solid var(--green-glow); color: var(--green); }
    .check-todo { background: var(--border); border: 1px solid transparent; }
    .check-text { font-size: 12px; line-height: 1.5; }
    .check-text.done { text-decoration: line-through; color: var(--muted); }

    /* Notes */
    .notes-area {
      width: 100%; background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 13px; line-height: 1.6; padding: 12px 14px; resize: vertical;
      min-height: 100px; transition: border-color .15s;
    }
    .notes-area:focus { outline: none; border-color: var(--green-glow); }
    .notes-area::placeholder { color: var(--muted); }

    /* Champion / Econ Buyer quick view */
    .person-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .person-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--green-dim); border: 1px solid var(--green-glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--green); flex-shrink: 0;
    }
    .person-info .pname { font-weight: 600; }
    .person-info .ptitle { font-size: 11px; color: var(--muted); }

    /* Last updated */
    .last-updated { font-size: 11px; color: var(--muted); text-align: right; margin-top: 24px; }

    .save-btn {
      background: var(--green-dim); border: 1px solid var(--green-glow);
      color: var(--green); font-size: 12px; font-weight: 600;
      padding: 7px 16px; border-radius: 8px; cursor: pointer;
      transition: all .15s; margin-top: 16px;
    }
    .save-btn:hover { background: rgba(0,168,107,.22); }
    .save-flash { color: var(--green); font-size: 12px; display: none; }

    footer { text-align: center; padding: 20px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
  </style>
</head>

<header>

function loadDeals() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Merge: add any new DEFAULT_DEALS that aren't in saved data yet
      DEFAULT_DEALS.forEach(def => {
        if (!saved.find(d => d.id === def.id)) saved.push(JSON.parse(JSON.stringify(def)));
      });
      return saved;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DEALS));
}

function saveDeals() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DEALS));
}

let DEALS = loadDeals();
let currentId = null;

// ── SIDEBAR ──
function renderSidebar() {
  const stageClass = { 'Propose':'s-propose', 'Negotiate':'s-negotiate', 'Qualify':'s-qualify', 'Closed Won':'s-negotiate' };
  document.getElementById('deal-list').innerHTML = DEALS.map(d => `
    <div class="deal-item ${currentId === d.id ? 'active' : ''}" onclick="openDeal('${d.id}')">
      <div class="di-name">${d.name}</div>
      <div class="di-meta">${d.close} · ${d.arr}</div>
      <span class="di-stage ${stageClass[d.stage] || 's-qualify'}">${d.stage}</span>
    </div>
  `).join('');
}

// ── DETAIL PANEL ──
function openDeal(id) {
  currentId = id;
  renderSidebar();
  const deal = DEALS.find(d => d.id === id);
  if (!deal) return;

  const medFields = [
    { key:'metrics',        label:'Metrics',          icon:'📈', sub:'Quantified impact' },
    { key:'economic_buyer', label:'Economic Buyer',   icon:'💼', sub:'Who signs the check' },
    { key:'decision_criteria', label:'Decision Criteria', icon:'✅', sub:'Why they buy' },
    { key:'decision_process',  label:'Decision Process',  icon:'🗺', sub:'Steps to close' },
    { key:'pain',           label:'Identified Pain',  icon:'🔥', sub:'Root problem' },
    { key:'champion',       label:'Champion',         icon:'⭐', sub:'Internal advocate' },
  ];

  // Compute a simple MEDDIC score (% of fields with content > 40 chars)

  const score = Math.round(filled / medFields.length * 100);

      <div class="dh-left">
        <div class="dh-company">${deal.name}</div>
        <div class="dh-meta">${deal.industry} · Close ${deal.close} · ${deal.arr} · SE: ${deal.se}</div>
        <div class="dh-links">
          ${deal.map_url ? `<a href="${deal.map_url}" target="_blank" class="dh-link dh-link-map">🗺️ Open MAP</a>` : ''}
          ${deal.proposal_url ? `<a href="${deal.proposal_url}" target="_blank" class="dh-link dh-link-prop">📄 View Proposal</a>` : ''}
          ${deal.sf_url ? `<a href="${deal.sf_url}" target="_blank" class="dh-link dh-link-sf">☁️ Salesforce</a>` : ''}
        </div>
      </div>
      <div class="dh-score">
        <div class="dh-score-val">${score}%</div>
        <div class="dh-score-sub">MEDDIC Score</div>
      </div>
    </div>

    <!-- MEDDIC -->
    <div class="section-title">MEDDIC Qualification</div>
    <div class="meddic-grid">
      ${medFields.map(f => {
        const val = deal.meddic[f.key] || '';
        const isEmpty = val.trim().length === 0;
        const dot = val.length > 100 ? 'dot-green' : val.length > 30 ? 'dot-amber' : 'dot-gray';
        return `<div class="med-card">
          <div class="med-header">
            <span class="med-icon">${f.icon}</span>
            <span class="med-label">${f.label}</span>
            <span class="med-sublabel">${f.sub}</span>
            <div class="med-dot ${dot}"></div>
          </div>
          <div class="med-content" contenteditable="true"
            data-field="${f.key}" data-empty="${isEmpty}"
            onblur="saveMed('${id}','${f.key}',this)"
            onfocus="this.dataset.empty='false'"
            >${isEmpty ? `Enter ${f.label.toLowerCase()}…` : val.replace(/</g,'&lt;')}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Strategy + Risks -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">🧠 Strategy & Narrative</div>
        <textarea class="notes-area" id="strategy-${id}" onblur="saveStrategy('${id}',this.value)" placeholder="Deal strategy, positioning narrative, competitive notes…" rows="8">${deal.strategy || ''}</textarea>
      </div>
      <div class="panel">
        <div class="panel-title">⚠️ Risks & Mitigations</div>
        <div class="risk-list" id="risks-${id}"></div>
        <button class="add-risk-btn" onclick="addRisk('${id}')">+ Add Risk</button>
      </div>
    </div>

    <!-- Done / Left -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">✅ What's Done</div>
        <div class="check-list" id="done-${id}"></div>
        <button class="add-done-btn" onclick="addDone('${id}')">+ Add Completed Item</button>
      </div>
      <div class="panel">
        <div class="panel-title">🔲 What's Left to Close</div>
        <div class="check-list" id="left-${id}"></div>
        <button class="add-left-btn" onclick="addLeft('${id}')">+ Add Remaining Item</button>
      </div>
    </div>

    <!-- Notes -->
    <div class="one-col">
      <div class="section-title">Notes</div>
      <div class="panel">
        <textarea class="notes-area" id="notes-${id}" onblur="saveNotes('${id}',this.value)" placeholder="Anything else — call recaps, stakeholder dynamics, open questions…" rows="5">${deal.notes || ''}</textarea>
      </div>
    </div>

    <div class="last-updated" id="last-updated-${id}">Last saved: never</div>
  `;

  renderRisks(id);
  renderDone(id);
  renderLeft(id);
}

// ── MEDDIC save ──
window.saveMed = (id, field, el) => {
  const deal = DEALS.find(d => d.id === id);
  if (!deal) return;
  const val = el.innerText.trim();
  const placeholder = `Enter ${field.replace(/_/g,' ')}…`;
  if (val === placeholder || val === '') {
    deal.meddic[field] = '';
    el.dataset.empty = 'true';
    el.innerText = `Enter ${field.replace(/_/g,' ')}…`;
  } else {
    deal.meddic[field] = val;
    el.dataset.empty = 'false';
  }
  saveDeals(); touch(id);
};

window.saveStrategy = (id, val) => {
  const deal = DEALS.find(d => d.id === id);
  if (deal) { deal.strategy = val; saveDeals(); touch(id); }
};

window.saveNotes = (id, val) => {
  const deal = DEALS.find(d => d.id === id);
  if (deal) { deal.notes = val; saveDeals(); touch(id); }
};

function touch(id) {
  const el = document.getElementById(`last-updated-${id}`);
  if (el) el.textContent = 'Last saved: ' + new Date().toLocaleTimeString();
}

// ── RISKS ──
function renderRisks(id) {
  const deal = DEALS.find(d => d.id === id);
  const el = document.getElementById(`risks-${id}`);
  if (!deal || !el) return;
  const sevClass = { high:'sev-high', med:'sev-med', low:'sev-low' };
  el.innerHTML = deal.risks.map((r,i) => `
    <div class="risk-item">
      <span class="risk-sev ${sevClass[r.sev] || 'sev-med'}" title="Click to cycle severity" style="cursor:pointer" onclick="cycleRiskSev('${id}',${i})">${r.sev}</span>
      <div>
        <div class="risk-text" contenteditable="true" onblur="saveRisk('${id}',${i},'text',this.innerText)">${r.text}</div>
        <div class="risk-mit" contenteditable="true" onblur="saveRisk('${id}',${i},'mit',this.innerText)">→ ${r.mit}</div>
      </div>
    </div>
  `).join('');
}

window.cycleRiskSev = (id, i) => {
  const deal = DEALS.find(d => d.id === id);
  const sevs = ['high','med','low'];
  deal.risks[i].sev = sevs[(sevs.indexOf(deal.risks[i].sev) + 1) % sevs.length];
  saveDeals(); renderRisks(id); touch(id);
};

window.saveRisk = (id, i, field, val) => {
  const deal = DEALS.find(d => d.id === id);
  if (deal) { deal.risks[i][field] = val.replace(/^→\s*/,'').trim(); saveDeals(); touch(id); }
};

window.addRisk = (id) => {
  const deal = DEALS.find(d => d.id === id);
  if (deal) { deal.risks.push({ sev:'med', text:'New risk', mit:'Mitigation TBD' }); saveDeals(); renderRisks(id); touch(id); }
};

// ── DONE / LEFT ──
function renderDone(id) {
  const deal = DEALS.find(d => d.id === id);
  const el = document.getElementById(`done-${id}`);
  if (!deal || !el) return;
  el.innerHTML = deal.done.map((t,i) => `
    <div class="check-item">
      <div class="check-box check-done">✓</div>
      <div class="check-text done" contenteditable="true" onblur="saveDone('${id}',${i},this.innerText)">${t}</div>
    </div>
  `).join('');
}

function renderLeft(id) {
  const deal = DEALS.find(d => d.id === id);
  const el = document.getElementById(`left-${id}`);
  if (!deal || !el) return;
  el.innerHTML = deal.left.map((t,i) => `
    <div class="check-item">
      <div class="check-box check-todo" title="Click to mark done" style="cursor:pointer" onclick="markDone('${id}',${i})"></div>
      <div class="check-text" contenteditable="true" onblur="saveLeft('${id}',${i},this.innerText)">${t}</div>
    </div>
  `).join('');
}

window.saveDone = (id,i,v) => { const d=DEALS.find(x=>x.id===id); if(d){d.done[i]=v.trim();saveDeals();touch(id);} };
window.saveLeft = (id,i,v) => { const d=DEALS.find(x=>x.id===id); if(d){d.left[i]=v.trim();saveDeals();touch(id);} };
window.markDone = (id,i) => {
  const d=DEALS.find(x=>x.id===id);
  if(d){ const t=d.left.splice(i,1)[0]; d.done.push(t); saveDeals(); renderDone(id); renderLeft(id); touch(id); }
};
window.addDone = (id) => { const d=DEALS.find(x=>x.id===id); if(d){d.done.push('Completed item');saveDeals();renderDone(id);touch(id);} };
window.addLeft = (id) => { const d=DEALS.find(x=>x.id===id); if(d){d.left.push('Remaining item');saveDeals();renderLeft(id);touch(id);} };

// ── ADD DEAL ──
window.addDeal = () => {
  const name = prompt('Company name:');
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-');
  DEALS.push({
    id, name,
    industry: 'Industry · Location',
    stage: 'Qualify',
    close: 'TBD',
    arr: 'TBD',
    se: 'TBD',
    map_url: '',
    proposal_url: '',
    meddic: { metrics:'', economic_buyer:'', decision_criteria:'', decision_process:'', pain:'', champion:'' },
    strategy: '',
    risks: [],
    done: [],
    left: [],
    notes: '',
  });
  saveDeals();
  renderSidebar();
  openDeal(id);
};

// ── INIT ──
renderSidebar();
// Auto-open first deal or hash
const hash = location.hash.replace('#','');
const firstId = hash && DEALS.find(d=>d.id===hash) ? hash : (DEALS[0] ? DEALS[0].id : null);
if (firstId) openDeal(firstId);
</script>

</body>
</html>
