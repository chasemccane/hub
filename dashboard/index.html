<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard · Chase McCane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --green: #00a86b;
      --green-dim: rgba(0,168,107,.10);
      --green-glow: rgba(0,168,107,.30);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,.10);
      --amber: #d97706;
      --amber-dim: rgba(217,119,6,.12);
      --blue: #2563eb;
      --blue-dim: rgba(37,99,235,.08);
      --text: #0f172a;
      --muted: #64748b;
      --card: #f1f5f9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; gap: 16px;
    }
    .back-btn {
      width: 32px; height: 32px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--muted); font-size: 16px; transition: all .15s;
    }
    .back-btn:hover { border-color: var(--green); color: var(--green); }
    .hbreadcrumb { font-size: 12px; color: var(--muted); }
    .hbreadcrumb a { color: var(--muted); text-decoration: none; }
    .hbreadcrumb a:hover { color: var(--green); }
    .htitle { font-size: 16px; font-weight: 800; margin-left: auto; }
    .last-refreshed { font-size: 11px; color: var(--muted); }

    main { max-width: 1400px; margin: 0 auto; padding: 32px 28px; }

    /* ── HERO ── */
    .hero { margin-bottom: 32px; }
    .hero-name { font-size: 26px; font-weight: 900; }
    .hero-role { font-size: 13px; color: var(--green); font-weight: 500; margin-top: 3px; }

    /* ── STAT CARDS ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
    @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px 18px;
    }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .stat-val { font-size: 32px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .stat-sub { font-size: 11px; color: var(--muted); }
    .val-green { color: var(--green); }
    .val-amber { color: var(--amber); }
    .val-red { color: var(--red); }
    .val-blue { color: var(--blue); }

    /* ── MAIN GRID ── */
    .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: start; }
    .tasks-below { margin-top: 28px; }

    /* ── KANBAN ── */
    .board-title { font-size: 13px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
    .kanban { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    @media (max-width: 1200px) { .kanban { grid-template-columns: repeat(3, 1fr); } }

    .col-header {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      padding: 6px 10px; border-radius: 6px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .col-preq  { background: rgba(107,122,138,.1); color: var(--muted); }
    .col-env   { background: var(--amber-dim); color: var(--amber); }
    .col-sol   { background: var(--blue-dim); color: var(--blue); }
    .col-demo  { background: var(--green-dim); color: var(--green); }
    .col-craft { background: rgba(124,58,237,.10); color: #7c3aed; }
    .col-won   { background: rgba(0,168,107,.2); color: var(--green); }
    .col-count { font-size: 11px; font-weight: 800; opacity: .7; }

    .deal-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; margin-bottom: 8px;
      transition: all .15s; cursor: pointer; text-decoration: none; display: block; color: inherit;
    }
    .deal-card:hover { border-color: var(--green); box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }
    .dc-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
    .dc-industry { font-size: 10px; color: var(--muted); margin-bottom: 8px; line-height: 1.3; }
    .dc-pbr { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
    .dc-close { font-size: 10px; color: var(--muted); }
    .dc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .dc-tag {
      font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .tag-map  { background: var(--green-dim); color: var(--green); }
    .tag-se   { background: var(--blue-dim); color: var(--blue); }

    /* ── UPCOMING CALLS ── */
    .upcoming-calls {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px;
    }
    .uc-row {
      display: flex; align-items: center; gap: 16px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .uc-row:last-child { border-bottom: none; padding-bottom: 0; }
    .uc-deal { font-size: 13px; font-weight: 600; width: 200px; flex-shrink: 0; }
    .uc-pills { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
    .uc-pill { display: flex; align-items: center; gap: 6px; }
    .uc-type {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0;
    }
    .uc-intro     { background: var(--blue-dim); color: var(--blue); }
    .uc-demo      { background: var(--green-dim); color: var(--green); }
    .uc-partner   { background: var(--amber-dim); color: var(--amber); }
    .uc-workshop  { background: rgba(124,58,237,.10); color: #7c3aed; }
    .uc-discussion { background: var(--border); color: var(--muted); }
    .uc-proposal  { background: var(--red-dim); color: var(--red); }
    .uc-discovery { background: var(--blue-dim); color: var(--blue); }
    .uc-when { font-size: 11px; color: var(--muted); }

    /* ── THIS WEEK'S CALLS ── */
    .calls-section { margin-bottom: 28px; }
    .calls-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
    @media (max-width: 900px) { .calls-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── FORECAST ── */
    .forecast-section { margin-bottom: 32px; }
    .forecast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 700px) { .forecast-grid { grid-template-columns: 1fr; } }
    .forecast-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px 22px;
    }
    .fc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .fc-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .fc-pct { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
    .fc-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
    .fc-val { font-size: 36px; font-weight: 900; line-height: 1; cursor: pointer; }
    .fc-val:focus { outline: 2px solid var(--green); border-radius: 4px; }
    .fc-sep { font-size: 18px; font-weight: 300; color: var(--muted); }
    .fc-goal { font-size: 18px; font-weight: 700; color: var(--muted); cursor: pointer; }
    .fc-goal:focus { outline: 2px solid var(--green); border-radius: 4px; }
    .fc-sublabel { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .fc-bar-track { width: 100%; height: 6px; border-radius: 4px; background: rgba(0,0,0,.07); margin-top: 14px; overflow: hidden; }
    .fc-bar-fill { height: 6px; border-radius: 4px; transition: width .5s ease; }
    .fc-hint { font-size: 10px; color: var(--muted); margin-top: 8px; font-style: italic; opacity: .6; }
  </style>
</head>

    { start:'2026-04-08T11:30:00-07:00', time:'11:30–12:00pm', title:'Partner Intro · Crimson Agility + Franklen', type:'partner',    meet:'https://meet.google.com/wyz-yzah-nqz', deal:'franklen' },
    { start:'2026-04-08T12:00:00-07:00', time:'12:00–12:30pm', title:'Washington Floral / Shopify Intro',          type:'intro',      meet:'https://meet.google.com/aex-fpzj-aod', deal:'washington-floral' },
    { start:'2026-04-08T13:00:00-07:00', time:'1:00–2:00pm',   title:'Demo · Feniex',                              type:'demo',       meet:'https://meet.google.com/zki-yabw-kmm', deal:'feniex' },
    { start:'2026-04-09T11:30:00-07:00', time:'11:30–12:00pm', title:'Excellentia International · Intro',          type:'intro',      meet:'https://meet.google.com/zsr-bmix-ccs', deal:'excellentia' },
    { start:'2026-04-10T08:00:00-07:00', time:'8:00–8:45am',   title:'Partner Intro · ioVista + Franklen',   type:'partner',  meet:'https://meet.google.com/mxd-uejg-wud', deal:'franklen' },
    { start:'2026-04-10T11:30:00-07:00', time:'11:30–12:00pm', title:'Partner Intro · Netalico + Franklen',  type:'partner',  meet:'https://meet.google.com/qzy-yaus-otd', deal:'franklen' },
    { start:'2026-04-13T08:00:00-07:00', time:'8:00–9:00am',   title:'Technical Workshop · Hedrick',         type:'workshop', meet:'https://meet.google.com/kuu-cmdi-waa', deal:'hedrick' },
    { start:'2026-04-13T09:30:00-07:00', time:'9:30–10:00am',  title:'Franklen Equipment Discussion',        type:'discussion', meet:'https://meet.google.com/dos-vxbg-sca', deal:'franklen' },
    { start:'2026-04-13T12:00:00-07:00', time:'12:00–12:30pm', title:'Orbital Transports · Intro (CL)',      type:'intro',    meet:'https://meet.google.com/jmz-gacc-phz', deal:'' },
    { start:'2026-04-13T14:00:00-07:00', time:'2:00–2:30pm',   title:'Partner Intro · Netformic + Franklen', type:'partner',  meet:'https://meet.google.com/ybg-kumj-uwg', deal:'franklen' },

    { start:'2026-04-15T14:00:00-07:00', time:'2:00–2:30pm',   title:'Intro · Newegg',                              type:'intro',    meet:'https://meet.google.com/urs-bbuy-dvj', deal:'newegg' },
    { start:'2026-04-17T08:30:00-07:00', time:'8:30–9:00am',   title:'Project Sync · Shopify + Hedrick',            type:'workshop', meet:'https://meet.google.com/hms-iutb-mkw', deal:'hedrick' },
    { start:'2026-04-17T09:05:00-07:00', time:'9:05–9:30am',   title:'Partner Intro · Atwix + Bulldog Tools',       type:'partner',  meet:'https://meet.google.com/hja-vxrv-bzh', deal:'bulldog-tools' },
    { start:'2026-04-20T09:30:00-07:00', time:'9:30–10:00am',  title:'Partner Convo · Satel + KYD',                 type:'partner',  meet:'https://meet.google.com/gzj-cmgx-ivd', deal:'kyd' },
    { start:'2026-04-23T12:00:00-07:00', time:'12:00–1:00pm',  title:'Demo · Big Rock Supply',                      type:'demo',     meet:'https://meet.google.com/tgd-gkjs-kax', deal:'bigrock' },
  ];

  // remote data overlay (risks, left items)
  let remoteDeals = {};

  function fmtMoney(n) {
    if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return '$' + Math.round(n/1000) + 'k';
    return '$' + n.toLocaleString();
  }

  function daysUntil(iso) {
    const d = new Date(iso); const now = new Date(); now.setHours(0,0,0,0);
    return Math.round((d - now) / 86400000);
  }

  function fmtDate(iso) {
    const [y,m,d] = iso.split('-');
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1] + ' ' + +d;
  }

  function renderStats() {
    const active = DEALS.filter(d => d.stage !== 'Closed Won').length;
    const pbrTotal = DEALS.filter(d => ['Envision','Solution','Demonstrate','Closed Won'].includes(d.stage))
                         .reduce((s, d) => s + (d.pbr||0), 0);
    const closing30 = DEALS.filter(d => { const x = daysUntil(d.close); return x >= 0 && x <= 30; }).length;
    const advanced  = DEALS.filter(d => ['Solution','Demonstrate'].includes(d.stage)).length;

    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Active Deals</div>
        <div class="stat-val val-green">${active}</div>
        <div class="stat-sub">${DEALS.length} total in pipeline</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PBR Pipeline</div>
        <div class="stat-val val-green">${fmtMoney(pbrTotal)}</div>
        <div class="stat-sub">Envision+ deals</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Closing ≤ 30 Days</div>
        <div class="stat-val val-amber">${closing30}</div>
        <div class="stat-sub">urgent attention needed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Advanced Stage</div>
        <div class="stat-val val-blue">${advanced}</div>
        <div class="stat-sub">Solution or Demonstrate</div>
      </div>
    `;
  }

  function renderKanban() {
    const stages = [
      { key: 'Pre-Qualified', label: 'Pre-Qualified', cls: 'col-preq' },
      { key: 'Envision',      label: 'Envision',      cls: 'col-env'  },
      { key: 'Solution',      label: 'Solution',      cls: 'col-sol'  },
      { key: 'Demonstrate',   label: 'Demonstrate',   cls: 'col-demo'  },
      { key: 'Deal Craft',    label: 'Deal Craft',    cls: 'col-craft' },
      { key: 'Closed Won',    label: 'Closed Won',    cls: 'col-won'   },
    ];

    document.getElementById('kanban').innerHTML = stages.map(({ key, label, cls }) => {
      const deals = DEALS.filter(d => d.stage === key).sort((a,b) => new Date(a.close) - new Date(b.close));
      const cards = deals.length === 0
        ? `<div class="empty-col">No deals</div>`
        : deals.map(d => {
            const days = daysUntil(d.close);
            const closeStr = `${fmtDate(d.close)} · ${days >= 0 ? days + 'd away' : Math.abs(days) + 'd ago'}`;
            const tags = [
              d.map_url ? `<span class="dc-tag tag-map">MAP</span>` : '',
              d.se      ? `<span class="dc-tag tag-se">SE: ${d.se.split(' ')[0]}</span>` : '',
            ].filter(Boolean).join('');
            return `
              <a href="../deal-review/#${d.id}" class="deal-card">
                <div class="dc-name">${d.name}</div>
                <div class="dc-industry">${d.industry}</div>
                ${d.pbr > 0 ? `<div class="dc-pbr">${fmtMoney(d.pbr)}</div>` : ''}
                <div class="dc-close">Close ${closeStr}</div>
                ${tags ? `<div class="dc-tags">${tags}</div>` : ''}
              </a>`;
          }).join('');

      return `
        <div>
          <div class="col-header ${cls}">
            <span>${label}</span>
            <span class="col-count">${deals.length}</span>
          </div>
          ${cards}
        </div>`;
    }).join('');
  }

  function renderTasks() {
    const dealMap = {};
    DEALS.forEach(d => { dealMap[d.id] = d.name; });

    const typeLabel = {
      intro: 'Intro', demo: 'Demo', partner: 'Partner Intro',
      workshop: 'Technical Workshop', discovery: 'Technical Disco',
      proposal: 'Proposal', discussion: 'Discussion',
    };

    // Week bounds: Mon 00:00 → next Mon 00:00
    const now = new Date();
    const dayOfWeek = now.getDay(); // 0=Sun
    const toMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() + toMonday);
    const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 7);

    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fmtWhen(iso) {
      const d = new Date(iso);
      const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
      const isTomorrow = d.toDateString() === tomorrow.toDateString();
      const dayStr = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
      const h = d.getHours(), m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      const hr = h > 12 ? h - 12 : h === 0 ? 12 : h;
      const min = m > 0 ? `:${String(m).padStart(2,'0')}` : '';
      return `${dayStr} · ${hr}${min}${ampm}`;
    }

    // Group by deal, preserving earliest-call order per group
    const grouped = new Map();
    CALLS
      .filter(c => {
        const t = new Date(c.start);
        const cap = new Date(weekEnd); cap.setDate(weekEnd.getDate() + 30);
        return t >= weekEnd && t < cap;
      })
      .sort((a, b) => new Date(a.start) - new Date(b.start))
      .forEach(c => {
        const key = c.deal || c.title;
        const name = c.deal ? (dealMap[c.deal] || c.deal) : c.title.split('·')[0].trim();
        if (!grouped.has(key)) grouped.set(key, { name, calls: [] });
        grouped.get(key).calls.push(c);
      });

    const rows = [...grouped.values()].map(({ name, calls }) => {
      const pills = calls.map(c => `
        <span class="uc-pill">
          <span class="uc-type uc-${c.type}">${typeLabel[c.type] || c.type}</span>
          <span class="uc-when">${fmtWhen(c.start)}</span>
        </span>`).join('');
      return `
        <div class="uc-row">
          <div class="uc-deal">${name}</div>
          <div class="uc-pills">${pills}</div>
        </div>`;
    }).join('');

    document.getElementById('tasks-panel').innerHTML = `
      <div class="upcoming-calls">
        ${rows || '<div style="font-size:11px;color:var(--muted);padding:8px 0;font-style:italic">No upcoming calls this week</div>'}
      </div>`;
  }

  function renderCalls() {
    const cats = [
      { key:'intro',     label:'Intro Calls' },
      { key:'demo',      label:'Demos' },
      { key:'discovery', label:'Technical Disco' },
      { key:'workshop',  label:'Workshops' },
      { key:'partner',   label:'Partner Calls' },
      { key:'proposal',  label:'Proposal Calls' },
    ];
    const dow = new Date().getDay();
    const wkStart = new Date(); wkStart.setDate(wkStart.getDate() + (dow === 0 ? -6 : 1 - dow)); wkStart.setHours(0,0,0,0);
    const wkEnd = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 7);
    const counts = {};
    cats.forEach(c => counts[c.key] = 0);
    CALLS.filter(c => { const t = new Date(c.start); return t >= wkStart && t < wkEnd; })
         .forEach(c => { if (counts[c.type] !== undefined) counts[c.type]++; });

    document.getElementById('calls-row').innerHTML = cats.map(c => `
      <div class="stat-card">
        <div class="stat-label">${c.label}</div>
        <div class="stat-val ${counts[c.key] > 0 ? 'val-green' : ''}" style="${counts[c.key] === 0 ? 'color:var(--muted)' : ''}">${counts[c.key]}</div>
      </div>`).join('');
  }

  // ── FORECAST ──
  const FC_KEY = 'hub-forecast';
  const FC_DEFAULTS = { opps: 4, opps_goal: 7, pbr: 800000, pbr_quota: 1041000 };
  let fc = Object.assign({}, FC_DEFAULTS);
  try { const s = localStorage.getItem(FC_KEY); if (s) fc = {...FC_DEFAULTS, ...JSON.parse(s)}; } catch(e) {}

  function saveFc() { localStorage.setItem(FC_KEY, JSON.stringify(fc)); }

  function parsePbr(raw) {
    const s = raw.replace(/[$,\s]/g, '').toUpperCase();
    if (s.endsWith('M')) return Math.round(parseFloat(s) * 1000000);
    if (s.endsWith('K')) return Math.round(parseFloat(s) * 1000);
    return parseInt(s) || 0;
  }

  function renderForecast() {
    const pctOpps = fc.opps_goal > 0 ? Math.round(fc.opps / fc.opps_goal * 100) : 0;
    const pctPbr  = fc.pbr_quota > 0 ? Math.round(fc.pbr  / fc.pbr_quota  * 100) : 0;

    function barColor(pct) {
      if (pct >= 80) return 'linear-gradient(90deg,#00a86b,#00d4a0)';
      if (pct >= 50) return 'linear-gradient(90deg,#f59e0b,#fbbf24)';
      return 'linear-gradient(90deg,#ff3000,#ff6b35)';
    }
    function pctColor(pct) {
      if (pct >= 80) return { bg:'var(--green-dim)', color:'var(--green)' };
      if (pct >= 50) return { bg:'var(--amber-dim)', color:'var(--amber)' };
      return { bg:'var(--red-dim)', color:'var(--red)' };
    }

    const ocol = pctColor(pctOpps), pcol = pctColor(pctPbr);
    const needed_opps = Math.max(0, fc.opps_goal - fc.opps);
    const needed_pbr  = Math.max(0, fc.pbr_quota - fc.pbr);

    document.getElementById('forecast-grid').innerHTML = `
      <div class="forecast-card">
        <div class="fc-header">
          <div class="fc-label">Opportunities</div>
          <div class="fc-pct" style="background:${ocol.bg};color:${ocol.color}">${pctOpps}% of goal</div>
        </div>
        <div class="fc-row">
          <div class="fc-val ${pctOpps >= 80 ? 'val-green' : pctOpps >= 50 ? 'val-amber' : 'val-red'}"
               contenteditable spellcheck="false"
               title="Click to edit"
               onblur="fc.opps=parseInt(this.textContent)||0;saveFc();renderForecast()"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
               >${fc.opps}</div>
          <div class="fc-sep">/</div>
          <div class="fc-goal"
               contenteditable spellcheck="false"
               title="Click to edit goal"
               onblur="fc.opps_goal=parseInt(this.textContent)||0;saveFc();renderForecast()"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
               >${fc.opps_goal}</div>
          <div>
            <div class="fc-sublabel">calling</div>
            <div class="fc-sublabel">goal</div>
          </div>
        </div>
        <div class="fc-bar-track"><div class="fc-bar-fill" style="width:${Math.min(pctOpps,100)}%;background:${barColor(pctOpps)}"></div></div>
        ${needed_opps > 0 ? `<div class="fc-hint">${needed_opps} more to hit goal</div>` : `<div class="fc-hint" style="color:var(--green);opacity:1">Goal reached</div>`}
      </div>

      <div class="forecast-card">
        <div class="fc-header">
          <div class="fc-label">PBR</div>
          <div class="fc-pct" style="background:${pcol.bg};color:${pcol.color}">${pctPbr}% of quota</div>
        </div>
        <div class="fc-row">
          <div class="fc-val ${pctPbr >= 80 ? 'val-green' : pctPbr >= 50 ? 'val-amber' : 'val-red'}"
               contenteditable spellcheck="false"
               title="Click to edit (e.g. 800k or 1.2M)"
               onblur="fc.pbr=parsePbr(this.textContent);saveFc();renderForecast()"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
               >${fmtMoney(fc.pbr)}</div>
          <div class="fc-sep">/</div>
          <div class="fc-goal"
               contenteditable spellcheck="false"
               title="Click to edit quota"
               onblur="fc.pbr_quota=parsePbr(this.textContent);saveFc();renderForecast()"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
               >${fmtMoney(fc.pbr_quota)}</div>
          <div>
            <div class="fc-sublabel">calling</div>
            <div class="fc-sublabel">quota</div>
          </div>
        </div>
        <div class="fc-bar-track"><div class="fc-bar-fill" style="width:${Math.min(pctPbr,100)}%;background:${barColor(pctPbr)}"></div></div>
        ${needed_pbr > 0 ? `<div class="fc-hint">${fmtMoney(needed_pbr)} to quota</div>` : `<div class="fc-hint" style="color:var(--green);opacity:1">Quota attained</div>`}
      </div>`;
  }

  function render() {
    renderStats();
    renderForecast();
    renderKanban();
    renderTasks();
    renderCalls();
  }

  // ── INIT ──
  render();
  (async () => {
    try {
      const res = await fetch(RAW_URL + '?cb=' + Date.now());
      if (!res.ok) return;
      const data = await res.json();
      if (data.deals) {
        remoteDeals = data.deals;
        // Apply sf overrides
        DEALS.forEach(d => {
          const r = data.deals[d.id];
          if (r && r.sf) {
            if (r.sf.pbr !== undefined) d.pbr = r.sf.pbr;
            if (r.sf.stage) d.stage = r.sf.stage;
            if (r.sf.close) d.close = r.sf.close;
          }
        });
      }
      if (data.updated) {
        const dt = new Date(data.updated);
        const fmt = dt.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short' });
        const el = document.getElementById('last-refreshed');
        if (el) el.textContent = `SF refreshed ${fmt}`;
      }
      render();
    } catch(e) {}
  })();
</script>
</body>
</html>
