name: Refresh Deal Data from Salesforce

on:
  schedule:
    # 6:00 AM Pacific (UTC-7 summer / UTC-8 winter)
    # Using 14:00 UTC = 6am PDT (Pacific Daylight Time, Mar–Nov)
    - cron: '0 14 * * *'
  workflow_dispatch:   # enables the manual "Run workflow" button in GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit deal-data.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install simple-salesforce

      - name: Run Salesforce refresh
        env:
          SF_USERNAME:       ${{ secrets.SF_USERNAME }}
          SF_PASSWORD:       ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
          SF_DOMAIN:         ${{ secrets.SF_DOMAIN }}   # optional — leave blank for production
        run: python scripts/refresh_deals.py

      - name: Commit updated deal-data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh: Salesforce deal data ${{ env.CURRENT_DATE }}"
          file_pattern: deal-data.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
